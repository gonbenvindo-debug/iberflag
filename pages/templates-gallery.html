    <link rel="stylesheet" href="/assets/css/style.css?v=20260422h">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
        }

        body {
            background: var(--bg-light);
            min-height: 100vh;
        }

        .template-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: border-color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .template-card:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .template-preview {
            aspect-ratio: var(--preview-ratio, 4/3);
            background: #f8fafc;
            position: relative;
            overflow: hidden;
        }

        .template-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .template-preview svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .template-blank {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
        }

        .blank-icon {
            width: 64px;
            height: 64px;
            border: 3px dashed currentColor;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .category-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: white;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s, opacity 0.2s, transform 0.2s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .search-box {
            position: relative;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            background: white;
        }

        .search-box iconify-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .gallery-header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 24px 0;
        }

        @media (min-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }

        .template-info {
            padding: 16px;
        }

        .template-name {
            font-weight: 600;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .template-category {
            font-size: 13px;
            color: #64748b;
            text-transform: capitalize;
        }

        .loading-skeleton {
            background: linear-gradient(90deg, #f8fafc 25%, #e5e7eb 50%, #f8fafc 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state iconify-icon {
            font-size: 64px;
            color: #cbd5e1;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="gallery-header">
        <div class="container mx-auto px-4">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <div>
                    <a href="/produtos" class="text-sm text-gray-500 hover:text-blue-600 flex items-center gap-1 mb-2">
                        <iconify-icon icon="lucide:arrow-left" width="16"></iconify-icon>
                        Voltar aos produtos
                    </a>
                    <h1 class="text-2xl font-bold text-gray-900">Escolher Template</h1>
                    <p class="text-sm text-gray-500 mt-1" id="product-name">Personalize seu produto</p>
                </div>

                <div class="search-box">
                    <iconify-icon icon="lucide:search" width="18"></iconify-icon>
                    <input type="text" id="search-templates" placeholder="Pesquisar templates...">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <!-- Filtros de categoria -->
        <div class="category-filter" id="category-filters">
            <button class="filter-btn active" data-category="all">Todos</button>
            <button class="filter-btn" data-category="promocoes">Promoções</button>
            <button class="filter-btn" data-category="eventos">Eventos</button>
            <button class="filter-btn" data-category="corporativo">Corporativo</button>
            <button class="filter-btn" data-category="festas">Festas</button>
            <button class="filter-btn" data-category="varejo">Varejo</button>
        </div>

        <!-- Grid de templates -->
        <div class="gallery-grid" id="templates-grid">
            <!-- Template em branco (sempre primeiro) -->
            <div class="template-card" onclick="selectTemplate(null)">
                <div class="template-preview">
                    <div class="template-blank">
                        <div class="blank-icon">
                            <iconify-icon icon="lucide:plus" width="32"></iconify-icon>
                        </div>
                        <span class="font-medium">Começar em branco</span>
                    </div>
                </div>
                <div class="template-info">
                    <div class="template-name">Design personalizado</div>
                    <div class="template-category">Crie do zero</div>
                </div>
            </div>

            <!-- Templates serão carregados aqui -->
        </div>

        <!-- Estado vazio -->
        <div class="empty-state hidden" id="empty-state">
            <iconify-icon icon="lucide:image-off"></iconify-icon>
            <h3 class="text-lg font-semibold mb-2">Nenhum template encontrado</h3>
            <p class="text-sm">Tente uma pesquisa diferente ou crie um design do zero.</p>
        </div>
    </main>

    <script src="/assets/js/config.js"></script>
    <script>
        // Obter parametros da URL
        const urlParams = new URLSearchParams(window.location.search);
        const routeMatch = typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.parseLocationPath === 'function'
            ? SiteRoutes.parseLocationPath(window.location.pathname)
            : null;
        const productId = urlParams.get('produto');
        const productSlug = routeMatch?.productSlug || urlParams.get('slug') || '';
        const manifestProduct = typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.findProductBySlug === 'function'
            ? SiteRoutes.findProductBySlug(productSlug)
            : null;
        const productName = urlParams.get('nome') || manifestProduct?.nome || 'Produto';

        // Atualizar nome do produto
        document.getElementById('product-name').textContent = `Personalize: ${decodeURIComponent(productName)}`;

        // Inicializar Supabase
        const SUPABASE_URL = window.SUPABASE_URL || 'https://nzwfquivulxkmxrwqalz.supabase.co';
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || window.APP_CONFIG?.SUPABASE_ANON_KEY;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Estado
        let allTemplates = [];
        let currentCategory = 'all';

        // Carregar templates
        async function loadTemplates() {
            const grid = document.getElementById('templates-grid');

            // Mostrar skeletons
            for (let i = 0; i < 6; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'template-card';
                skeleton.innerHTML = `
                    <div class="template-preview loading-skeleton"></div>
                    <div class="template-info">
                        <div class="template-name loading-skeleton" style="height: 20px; width: 70%;"></div>
                        <div class="template-category loading-skeleton" style="height: 16px; width: 40%; margin-top: 8px;"></div>
                    </div>
                `;
                grid.appendChild(skeleton);
            }

            try {
                const { data, error } = await supabaseClient
                    .from('templates')
                    .select('*')
                    .eq('ativo', true)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // Remover skeletons
                grid.innerHTML = `
                    <div class="template-card" onclick="selectTemplate(null)">
                        <div class="template-preview">
                            <div class="template-blank">
                                <div class="blank-icon">
                                    <iconify-icon icon="lucide:plus" width="32"></iconify-icon>
                                </div>
                                <span class="font-medium">Começar em branco</span>
                            </div>
                        </div>
                        <div class="template-info">
                            <div class="template-name">Design personalizado</div>
                            <div class="template-category">Crie do zero</div>
                        </div>
                    </div>
                `;

                allTemplates = data || [];
                renderTemplates(allTemplates);
            } catch (err) {
                console.error('Erro ao carregar templates:', err);
                grid.innerHTML = `
                    <div class="template-card" onclick="selectTemplate(null)">
                        <div class="template-preview">
                            <div class="template-blank">
                                <div class="blank-icon">
                                    <iconify-icon icon="lucide:plus" width="32"></iconify-icon>
                                </div>
                                <span class="font-medium">Começar em branco</span>
                            </div>
                        </div>
                        <div class="template-info">
                            <div class="template-name">Design personalizado</div>
                            <div class="template-category">Crie do zero</div>
                        </div>
                    </div>
                `;

                // Fallback: usar templates locais
                if (typeof TEMPLATES_DATA !== 'undefined') {
                    allTemplates = Object.values(TEMPLATES_DATA).flat();
                    renderTemplates(allTemplates);
                }
            }
        }

        // Renderizar templates
        function renderTemplates(templates) {
            const grid = document.getElementById('templates-grid');
            const emptyState = document.getElementById('empty-state');

            // Manter o card "em branco"
            const blankCard = grid.firstElementChild;
            grid.innerHTML = '';
            grid.appendChild(blankCard);

            if (templates.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            templates.forEach(template => {
                const card = createTemplateCard(template);
                grid.appendChild(card);
            });
        }

        // Criar card de template
        function createTemplateCard(template) {
            const div = document.createElement('div');
            div.className = 'template-card';
            div.onclick = () => selectTemplate(template);

            const previewUrl = template.thumbnail_url || template.preview_url || '/assets/images/template-placeholder.svg';
            const previewMarkup = window.DesignSvgStore?.buildPreviewSvgMarkup?.(
                previewUrl,
                null,
                { backgroundColor: '#f8fafc' }
            );
            const categoryLabels = {
                'promocoes': 'Promocoes',
                'eventos': 'Eventos',
                'corporativo': 'Corporativo',
                'festas': 'Festas',
                'varejo': 'Varejo'
            };

            div.innerHTML = `
                <div class="template-preview">
                    ${previewMarkup
                        ? previewMarkup
                        : `<img src="${previewUrl}" alt="${template.nome}" loading="lazy"
                            onerror="this.src='/assets/images/template-placeholder.svg'">`}
                </div>
                <div class="template-info">
                    <div class="template-name">${template.nome}</div>
                    <div class="template-category">${categoryLabels[template.categoria] || template.categoria}</div>
                </div>
            `;

            return div;
        }

        // Selecionar template
        function selectTemplate(template) {
            const resolvedProduct = manifestProduct || (typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.findProductById === 'function'
                ? SiteRoutes.findProductById(productId)
                : null);
            if (!resolvedProduct && !productId) {
                alert('Erro: Produto não especificado');
                return;
            }

            const routeParams = {};
            if (template) {
                routeParams.template = template.id;
            }

            if (typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.buildProductPersonalizerPath === 'function' && resolvedProduct) {
                window.location.href = SiteRoutes.buildProductPersonalizerPath(resolvedProduct, routeParams);
                return;
            }

            const params = new URLSearchParams({ produto: productId, nome: productName, ...routeParams });
            window.location.href = `/personalizar?${params.toString()}`;
        }

        // Filtrar por categoria
        document.getElementById('category-filters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');

                currentCategory = e.target.dataset.category;
                filterTemplates();
            }
        });

        // Pesquisar
        document.getElementById('search-templates').addEventListener('input', (e) => {
            filterTemplates(e.target.value);
        });

        // Aplicar filtros
        function filterTemplates(searchTerm = '') {
            let filtered = allTemplates;

            // Filtro por categoria
            if (currentCategory !== 'all') {
                filtered = filtered.filter(t => t.categoria === currentCategory);
            }

            // Filtro por pesquisa
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(t =>
                    t.nome.toLowerCase().includes(term) ||
                    (t.descrição && t.descrição.toLowerCase().includes(term)) ||
                    (t.tags && t.tags.s?me(tag => tag.toLowerCase().includes(term)))
                );
            }

            renderTemplates(filtered);
        }

        // Carregar ao iniciar
        loadTemplates();
    </script>



</body></html>
