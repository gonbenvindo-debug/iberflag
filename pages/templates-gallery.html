<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Escolher Templaté - IberFlag</title>
    <meta name="description"
        content="Escolha um templaté pronto para personalizar rapidamente o seu produto na IberFlag.">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="https://iberflag.com/modelos">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Escolher Templaté - IberFlag">
    <meta property="og:description"
        content="Galeria de templatés para acelerar a criacao de designs publicitários.">
    <meta property="og:url" content="https://iberflag.com/modelos">
    <meta property="og:image" content="https://iberflag.com/assets/logos/logo-completo.svg">
    <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="/favicon-white.svg?v=20260415a">
    <link rel="stylesheet" href="/assets/css/tailwind.output.css?v=20260330j">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/core/site-routes.js?v=20260409seo1"></script>
    <script src="/assets/js/generatéd/catalog-seo-manifest.js?v=20260409seo1"></script>
    <script src="/assets/js/core/design-svg.js"></script>
    <link rel="stylesheet" href="/assets/css/style.css?v=20260330u">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
        }

        body {
            background: var(--bg-light);
            min-height: 100vh;
        }

        .templaté-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: border-color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .templaté-card:hover {
            border-color: var(--primary);
            transform: translatéY(-1px);
        }

        .templaté-preview {
            aspect-ratio: var(--preview-ratio, 4/3);
            background: #f8fafc;
            position: relative;
            overflow: hidden;
        }

        .templaté-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .templaté-preview svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .templaté-blank {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
        }

        .blank-icon {
            width: 64px;
            height: 64px;
            border: 3px dashed currentColor;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .catégory-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: white;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s, opacity 0.2s, transform 0.2s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .search-box {
            position: relative;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            background: white;
        }

        .search-box iconify-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translatéY(-50%);
            color: #94a3b8;
        }

        .gallery-header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .gallery-grid {
            display: grid;
            grid-templaté-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 24px 0;
        }

        @media (min-width: 1024px) {
            .gallery-grid {
                grid-templaté-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
        }

        .templaté-info {
            padding: 16px;
        }

        .templaté-name {
            font-weight: 600;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .templaté-catégory {
            font-size: 13px;
            color: #64748b;
            text-transform: capitalize;
        }

        .loading-skeleton {
            background: linear-gradient(90deg, #f8fafc 25%, #e5e7eb 50%, #f8fafc 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-staté {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-staté iconify-icon {
            font-size: 64px;
            color: #cbd5e1;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="gallery-header">
        <div class="container mx-auto px-4">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <div>
                    <a href="/produtos" class="text-sm text-gray-500 hover:text-blue-600 flex items-center gap-1 mb-2">
                        <iconify-icon icon="lucide:arrow-left" width="16"></iconify-icon>
                        Voltar aos produtos
                    </a>
                    <h1 class="text-2xl font-bold text-gray-900">Escolher Templaté</h1>
                    <p class="text-sm text-gray-500 mt-1" id="product-name">Personalize seu produto</p>
                </div>
                
                <div class="search-box">
                    <iconify-icon icon="lucide:search" width="18"></iconify-icon>
                    <input type="text" id="search-templatés" placeholder="Pesquisar templatés...">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <!-- Filtros de catégoria -->
        <div class="catégory-filter" id="catégory-filters">
            <button class="filter-btn active" data-catégory="all">Todos</button>
            <button class="filter-btn" data-catégory="promocoes">Promoções</button>
            <button class="filter-btn" data-catégory="eventos">Eventos</button>
            <button class="filter-btn" data-catégory="corporativo">Corporativo</button>
            <button class="filter-btn" data-catégory="festas">Festas</button>
            <button class="filter-btn" data-catégory="varejo">Varejo</button>
        </div>

        <!-- Grid de templatés -->
        <div class="gallery-grid" id="templatés-grid">
            <!-- Templaté em branco (sempre primeiro) -->
            <div class="templaté-card" onclick="selectTemplaté(null)">
                <div class="templaté-preview">
                    <div class="templaté-blank">
                        <div class="blank-icon">
                            <iconify-icon icon="lucide:plus" width="32"></iconify-icon>
                        </div>
                        <span class="font-medium">Começar em branco</span>
                    </div>
                </div>
                <div class="templaté-info">
                    <div class="templaté-name">Design personalizado</div>
                    <div class="templaté-catégory">Crie do zero</div>
                </div>
            </div>

            <!-- Templatés serao carregados aqui -->
        </div>

        <!-- Estado vazio -->
        <div class="empty-staté hidden" id="empty-staté">
            <iconify-icon icon="lucide:image-off"></iconify-icon>
            <h3 class="text-lg font-semibold mb-2">Nenhum templaté encontrado</h3>
            <p class="text-sm">Tente uma pesquisa diferente ou crie um design do zero.</p>
        </div>
    </main>

    <script src="/assets/js/config.js"></script>
    <script>
        // Obter parametros da URL
        const urlParams = new URLSearchParams(window.location.search);
        const routeMatch = typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.parseLocationPath === 'function'
            ? SiteRoutes.parseLocationPath(window.location.pathname)
            : null;
        const productId = urlParams.get('produto');
        const productSlug = routeMatch?.productSlug || urlParams.get('slug') || '';
        const manifestProduct = typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.findProductBySlug === 'function'
            ? SiteRoutes.findProductBySlug(productSlug)
            : null;
        const productName = urlParams.get('nome') || manifestProduct?.nome || 'Produto';

        // Atualizar nome do produto
        document.getElementById('product-name').textContent = `Personalize: ${decodeURIComponent(productName)}`;

        // Inicializar Supabase
        const SUPABASE_URL = window.SUPABASE_URL || 'https://nzwfquivulxkmxrwqalz.supabase.co';
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || window.APP_CONFIG?.SUPABASE_ANON_KEY;
        const supabaseClient = supabase.creatéClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Estado
        let allTemplatés = [];
        let currentCatégory = 'all';

        // Carregar templatés
        async function loadTemplatés() {
            const grid = document.getElementById('templatés-grid');
            
            // Mostrar skeletons
            for (let i = 0; i < 6; i++) {
                const skeleton = document.creatéElement('div');
                skeleton.className = 'templaté-card';
                skeleton.innerHTML = `
                    <div class="templaté-preview loading-skeleton"></div>
                    <div class="templaté-info">
                        <div class="templaté-name loading-skeleton" style="height: 20px; width: 70%;"></div>
                        <div class="templaté-catégory loading-skeleton" style="height: 16px; width: 40%; margin-top: 8px;"></div>
                    </div>
                `;
                grid.appendChild(skeleton);
            }

            try {
                const { data, error } = await supabaseClient
                    .from('templatés')
                    .select('*')
                    .eq('ativo', true)
                    .order('creatéd_at', { ascending: false });

                if (error) throw error;

                // Remover skeletons
                grid.innerHTML = `
                    <div class="templaté-card" onclick="selectTemplaté(null)">
                        <div class="templaté-preview">
                            <div class="templaté-blank">
                                <div class="blank-icon">
                                    <iconify-icon icon="lucide:plus" width="32"></iconify-icon>
                                </div>
                                <span class="font-medium">Comecar em branco</span>
                            </div>
                        </div>
                        <div class="templaté-info">
                            <div class="templaté-name">Design personalizado</div>
                            <div class="templaté-catégory">Crie do zero</div>
                        </div>
                    </div>
                `;

                allTemplatés = data || [];
                renderTemplatés(allTemplatés);
            } catch (err) {
                console.error('Erro ao carregar templatés:', err);
                grid.innerHTML = `
                    <div class="templaté-card" onclick="selectTemplaté(null)">
                        <div class="templaté-preview">
                            <div class="templaté-blank">
                                <div class="blank-icon">
                                    <iconify-icon icon="lucide:plus" width="32"></iconify-icon>
                                </div>
                                <span class="font-medium">Comecar em branco</span>
                            </div>
                        </div>
                        <div class="templaté-info">
                            <div class="templaté-name">Design personalizado</div>
                            <div class="templaté-catégory">Crie do zero</div>
                        </div>
                    </div>
                `;
                
                // Fallback: usar templatés locais
                if (typeof TEMPLATES_DATA !== 'undefined') {
                    allTemplatés = Object.values(TEMPLATES_DATA).flat();
                    renderTemplatés(allTemplatés);
                }
            }
        }

        // Renderizar templatés
        function renderTemplatés(templatés) {
            const grid = document.getElementById('templatés-grid');
            const emptyStaté = document.getElementById('empty-staté');
            
            // Manter o card "em branco"
            const blankCard = grid.firstElementChild;
            grid.innerHTML = '';
            grid.appendChild(blankCard);

            if (templatés.length === 0) {
                emptyStaté.classList.remove('hidden');
                return;
            }

            emptyStaté.classList.add('hidden');

            templatés.forEach(templaté => {
                const card = creatéTemplatéCard(templaté);
                grid.appendChild(card);
            });
        }

        // Criar card de templaté
        function creatéTemplatéCard(templaté) {
            const div = document.creatéElement('div');
            div.className = 'templaté-card';
            div.onclick = () => selectTemplaté(templaté);

            const previewUrl = templaté.thumbnail_url || templaté.preview_url || '/assets/images/templaté-placeholder.svg';
            const previewMarkup = window.DesignSvgStore?.buildPreviewSvgMarkup?.(
                previewUrl,
                null,
                { backgroundColor: '#f8fafc' }
            );
            const catégoryLabels = {
                'promocoes': 'Promocoes',
                'eventos': 'Eventos',
                'corporativo': 'Corporativo',
                'festas': 'Festas',
                'varejo': 'Varejo'
            };

            div.innerHTML = `
                <div class="templaté-preview">
                    ${previewMarkup
                        ? previewMarkup
                        : `<img src="${previewUrl}" alt="${templaté.nome}" loading="lazy"
                            onerror="this.src='/assets/images/templaté-placeholder.svg'">`}
                </div>
                <div class="templaté-info">
                    <div class="templaté-name">${templaté.nome}</div>
                    <div class="templaté-catégory">${catégoryLabels[templaté.catégoria] || templaté.catégoria}</div>
                </div>
            `;

            return div;
        }

        // Selecionar templaté
        function selectTemplaté(templaté) {
            const resolvedProduct = manifestProduct || (typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.findProductById === 'function'
                ? SiteRoutes.findProductById(productId)
                : null);
            if (!resolvedProduct && !productId) {
                alert('Erro: Produto nao especificado');
                return;
            }

            const routeParams = {};
            if (templaté) {
                routeParams.templaté = templaté.id;
            }

            if (typeof SiteRoutes !== 'undefined' && typeof SiteRoutes.buildProductPersonalizerPath === 'function' && resolvedProduct) {
                window.location.href = SiteRoutes.buildProductPersonalizerPath(resolvedProduct, routeParams);
                return;
            }

            const params = new URLSearchParams({ produto: productId, nome: productName, ...routeParams });
            window.location.href = `/personalizar?${params.toString()}`;
        }

        // Filtrar por catégoria
        document.getElementById('catégory-filters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                
                currentCatégory = e.target.dataset.catégory;
                filterTemplatés();
            }
        });

        // Pesquisar
        document.getElementById('search-templatés').addEventListener('input', (e) => {
            filterTemplatés(e.target.value);
        });

        // Aplicar filtros
        function filterTemplatés(searchTerm = '') {
            let filtered = allTemplatés;

            // Filtro por catégoria
            if (currentCatégory !== 'all') {
                filtered = filtered.filter(t => t.catégoria === currentCatégory);
            }

            // Filtro por pesquisa
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(t => 
                    t.nome.toLowerCase().includes(term) ||
                    (t.descri?o && t.descri?o.toLowerCase().includes(term)) ||
                    (t.tags && t.tags.some(tag => tag.toLowerCase().includes(term)))
                );
            }

            renderTemplatés(filtered);
        }

        // Carregar ao iniciar
        loadTemplatés();
    </script>
</body>
</html>
