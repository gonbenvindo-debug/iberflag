<body class="app-page bg-gray-50 min-h-screen">

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 min-h-[calc(100vh-64px)] flex items-center">
        <section class="w-full">
            <div class="rounded-2xl border border-gray-200 bg-white shadow-sm">

                        tracking e produtos associados.</p>

                    <form id="orders-search-form" class="mt-6 flex flex-col md:flex-row items-stretch gap-2.5">

                        <button id="orders-search-btn" type="submit" class="h-12 px-6 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 transition inline-flex items-center justify-center gap-2 whitespace-nowrap">
                            <i data-lucide="search" class="w-4 h-4"></i>
                            Consultar
                        </button>
                    </form>

                    <p class="text-xs text-gray-500 mt-3">Acesso apenas por codigo identificador.</p>
