<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizar Produto - LatinFlag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .canvas-container {
            background: #f8f9fa;
            background-image: 
                linear-gradient(rgba(0,0,0,.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .element-selected {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }
        
        .resize-handle {
            width: 10px;
            height: 10px;
            background: white;
            border: 2px solid #2563eb;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            z-index: 100;
        }
        
        .resize-handle:hover {
            background: #2563eb;
            transform: scale(1.3);
        }
    </style>
</head>
<body class="bg-gray-50 overflow-hidden">
    
    <!-- Top Navigation -->
    <nav class="bg-white border-b h-16 flex items-center px-4 justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="text-xl font-bold bg-gradient-to-r from-blue-600 to-blue-800 bg-clip-text text-transparent">
                LatinFlag
            </a>
            <span class="text-gray-400">|</span>
            <span id="product-name" class="font-semibold text-gray-700"></span>
        </div>
        
        <div class="flex items-center gap-3">
            <button id="undo-btn" class="p-2 hover:bg-gray-100 rounded" title="Desfazer">
                <i data-lucide="undo" class="w-5 h-5"></i>
            </button>
            <button id="redo-btn" class="p-2 hover:bg-gray-100 rounded" title="Refazer">
                <i data-lucide="redo" class="w-5 h-5"></i>
            </button>
            <div class="w-px h-6 bg-gray-300"></div>
            <button id="add-to-cart-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                Adicionar ao Carrinho
            </button>
            <a href="/produtos.html" class="p-2 hover:bg-gray-100 rounded">
                <i data-lucide="x" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-64px)]">
        
        <!-- Left Sidebar - Tools -->
        <aside class="w-72 bg-white border-r flex flex-col">
            <!-- Tool Tabs -->
            <div class="flex border-b">
                <button class="tool-tab-btn flex-1 py-3 px-4 border-b-2 border-blue-600 text-blue-600 font-semibold" data-tab="elements">
                    <i data-lucide="layers" class="w-4 h-4 inline mr-2"></i>
                    Elementos
                </button>
                <button class="tool-tab-btn flex-1 py-3 px-4 border-b-2 border-transparent text-gray-600 hover:text-gray-900" data-tab="properties">
                    <i data-lucide="settings" class="w-4 h-4 inline mr-2"></i>
                    Propriedades
                </button>
            </div>
            
            <!-- Elements Tab -->
            <div id="elements-tab" class="flex-1 overflow-y-auto p-4">
                <div class="space-y-3">
                    <button id="add-text-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold flex items-center justify-center gap-2">
                        <i data-lucide="type" class="w-5 h-5"></i>
                        Adicionar Texto
                    </button>
                    
                    <button id="add-image-btn" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold flex items-center justify-center gap-2">
                        <i data-lucide="image" class="w-5 h-5"></i>
                        Adicionar Imagem
                    </button>
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                    
                    <div class="pt-4">
                        <p class="text-sm font-semibold text-gray-700 mb-2">Formas</p>
                        <div class="grid grid-cols-3 gap-2">
                            <button class="shape-btn p-3 border-2 border-gray-300 rounded-lg hover:border-blue-600 hover:bg-blue-50 transition" data-shape="rectangle">
                                <i data-lucide="square" class="w-6 h-6 mx-auto"></i>
                            </button>
                            <button class="shape-btn p-3 border-2 border-gray-300 rounded-lg hover:border-blue-600 hover:bg-blue-50 transition" data-shape="circle">
                                <i data-lucide="circle" class="w-6 h-6 mx-auto"></i>
                            </button>
                            <button class="shape-btn p-3 border-2 border-gray-300 rounded-lg hover:border-blue-600 hover:bg-blue-50 transition" data-shape="triangle">
                                <i data-lucide="triangle" class="w-6 h-6 mx-auto"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Properties Tab -->
            <div id="properties-tab" class="flex-1 overflow-y-auto p-4 hidden">
                <div id="no-selection" class="text-center text-gray-400 py-12">
                    <i data-lucide="mouse-pointer" class="w-12 h-12 mx-auto mb-2"></i>
                    <p>Selecione um elemento para editar</p>
                </div>
                
                <div id="text-properties" class="space-y-4 hidden">
                    <h3 class="font-bold text-lg mb-4">Propriedades do Texto</h3>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Texto</label>
                        <input type="text" id="prop-text-content" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Fonte</label>
                        <select id="prop-text-font" class="w-full border rounded-lg px-3 py-2">
                            <option value="Arial">Arial</option>
                            <option value="Helvetica">Helvetica</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Impact">Impact</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Tamanho: <span id="prop-text-size-val">24</span>px</label>
                        <input type="range" id="prop-text-size" min="12" max="120" value="24" class="w-full">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Cor</label>
                        <input type="color" id="prop-text-color" value="#000000" class="w-full h-10 rounded cursor-pointer">
                    </div>
                    <div class="flex gap-2">
                        <button id="prop-text-bold" class="flex-1 border-2 py-2 rounded hover:bg-gray-100 font-bold">B</button>
                        <button id="prop-text-italic" class="flex-1 border-2 py-2 rounded hover:bg-gray-100 italic">I</button>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Rotação: <span id="prop-text-rotation-val">0</span>°</label>
                        <input type="range" id="prop-text-rotation" min="0" max="360" value="0" class="w-full">
                    </div>
                </div>
                
                <div id="image-properties" class="space-y-4 hidden">
                    <h3 class="font-bold text-lg mb-4">Propriedades da Imagem</h3>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Opacidade: <span id="prop-image-opacity-val">100</span>%</label>
                        <input type="range" id="prop-image-opacity" min="0" max="100" value="100" class="w-full">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Rotação: <span id="prop-image-rotation-val">0</span>°</label>
                        <input type="range" id="prop-image-rotation" min="0" max="360" value="0" class="w-full">
                    </div>
                </div>
                
                <div id="shape-properties" class="space-y-4 hidden">
                    <h3 class="font-bold text-lg mb-4">Propriedades da Forma</h3>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Cor de Preenchimento</label>
                        <input type="color" id="prop-shape-fill" value="#3b82f6" class="w-full h-10 rounded cursor-pointer">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Cor do Contorno</label>
                        <input type="color" id="prop-shape-stroke" value="#000000" class="w-full h-10 rounded cursor-pointer">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Espessura: <span id="prop-shape-stroke-val">0</span>px</label>
                        <input type="range" id="prop-shape-stroke-width" min="0" max="10" value="0" class="w-full">
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-gray-700 block mb-1">Rotação: <span id="prop-shape-rotation-val">0</span>°</label>
                        <input type="range" id="prop-shape-rotation" min="0" max="360" value="0" class="w-full">
                    </div>
                </div>
                
                <div class="pt-4 border-t mt-4">
                    <button id="delete-element-btn" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition font-semibold">
                        <i data-lucide="trash-2" class="w-4 h-4 inline mr-2"></i>
                        Eliminar Elemento
                    </button>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="flex-1 flex flex-col">
            <div class="flex-1 canvas-container flex items-center justify-center p-8 overflow-auto">
                <div id="canvas-wrapper" class="relative bg-white shadow-2xl" style="width: 800px; height: 600px;">
                    <svg id="design-canvas" width="800" height="600" class="absolute inset-0">
                        <!-- Template will be loaded here -->
                    </svg>
                    <div id="resize-handles" class="hidden"></div>
                    <!-- Print Area Outline Overlay -->
                    <div class="absolute inset-0" style="pointer-events: none; z-index: 1000;">
                        <svg width="800" height="600">
                            <rect id="print-area-outline" x="50" y="50" width="700" height="500" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <!-- Bottom Toolbar -->
            <div class="bg-white border-t px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <button id="zoom-out" class="p-2 hover:bg-gray-100 rounded">
                            <i data-lucide="zoom-out" class="w-4 h-4"></i>
                        </button>
                        <span id="zoom-level" class="text-sm font-semibold min-w-[60px] text-center">100%</span>
                        <button id="zoom-in" class="p-2 hover:bg-gray-100 rounded">
                            <i data-lucide="zoom-in" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <span class="text-sm text-gray-600">Preço:</span>
                    <span id="product-price" class="text-lg font-bold text-blue-600"></span>
                </div>
            </div>
        </main>

        <!-- Right Sidebar - Layers -->
        <aside class="w-64 bg-white border-l flex flex-col">
            <div class="p-4 border-b">
                <h3 class="font-bold text-lg">Camadas</h3>
            </div>
            <div id="layers-list" class="flex-1 overflow-y-auto p-4">
                <p class="text-sm text-gray-400 text-center py-8">Nenhuma camada ainda</p>
            </div>
        </aside>
    </div>

    <script src="/js/logic.js"></script>
    <script src="/js/personalizar.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
