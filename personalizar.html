<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizar Produto - LatinFlag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="flex items-center gap-2">
                    <i data-lucide="flag" class="text-blue-600 w-8 h-8"></i>
                    <span class="text-2xl font-bold">LatinFlag</span>
                </a>
                <div class="flex items-center gap-4">
                    <span id="product-name" class="font-semibold text-gray-700"></span>
                    <a href="/produtos.html" class="text-gray-600 hover:text-gray-900 flex items-center gap-2">
                        <i data-lucide="x" class="w-5 h-5"></i>
                        Fechar
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-64px)]">
        
        <!-- Toolbar Lateral -->
        <aside class="w-80 bg-white border-r overflow-y-auto">
            <div class="p-6">
                <h2 class="text-xl font-bold mb-6">Ferramentas de Design</h2>
                
                <!-- Tabs -->
                <div class="flex gap-1 mb-6 bg-gray-100 p-1 rounded-lg">
                    <button class="tool-tab active" data-tab="text">
                        <i data-lucide="type" class="w-4 h-4"></i>
                        <span>Texto</span>
                    </button>
                    <button class="tool-tab" data-tab="images">
                        <i data-lucide="image" class="w-4 h-4"></i>
                        <span>Imagens</span>
                    </button>
                    <button class="tool-tab" data-tab="shapes">
                        <i data-lucide="square" class="w-4 h-4"></i>
                        <span>Formas</span>
                    </button>
                </div>

                <!-- Text Panel -->
                <div id="text-panel" class="tool-panel">
                    <button id="add-text-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mb-4 flex items-center justify-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        Adicionar Texto
                    </button>
                    
                    <div id="text-controls" class="space-y-4 hidden">
                        <div>
                            <label class="form-label">Texto</label>
                            <input type="text" id="text-content" class="form-input" placeholder="Digite o texto...">
                        </div>
                        <div>
                            <label class="form-label">Fonte</label>
                            <select id="text-font" class="form-input">
                                <option value="Arial">Arial</option>
                                <option value="Helvetica">Helvetica</option>
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Courier New">Courier New</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Verdana">Verdana</option>
                                <option value="Impact">Impact</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Tamanho</label>
                            <input type="range" id="text-size" min="12" max="120" value="24" class="w-full">
                            <span id="text-size-value" class="text-sm text-gray-600">24px</span>
                        </div>
                        <div>
                            <label class="form-label">Cor</label>
                            <input type="color" id="text-color" value="#000000" class="w-full h-10 rounded cursor-pointer">
                        </div>
                        <div class="flex gap-2">
                            <button id="text-bold" class="flex-1 border border-gray-300 py-2 rounded hover:bg-gray-100 font-bold">B</button>
                            <button id="text-italic" class="flex-1 border border-gray-300 py-2 rounded hover:bg-gray-100 italic">I</button>
                            <button id="text-underline" class="flex-1 border border-gray-300 py-2 rounded hover:bg-gray-100 underline">U</button>
                        </div>
                    </div>
                </div>

                <!-- Images Panel -->
                <div id="images-panel" class="tool-panel hidden">
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                    <button id="add-image-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mb-4 flex items-center justify-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        Adicionar Imagem
                    </button>
                    <p class="text-sm text-gray-500 text-center mb-4">Clique para fazer upload ou cole URL abaixo</p>
                    <div class="flex gap-2">
                        <input type="url" id="image-url" class="form-input flex-1" placeholder="https://...">
                        <button id="add-image-url-btn" class="bg-gray-600 text-white px-4 rounded-lg hover:bg-gray-700">
                            <i data-lucide="link" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                    <div id="image-controls" class="space-y-4 mt-4 hidden">
                        <div>
                            <label class="form-label">Opacidade</label>
                            <input type="range" id="image-opacity" min="0" max="100" value="100" class="w-full">
                            <span id="image-opacity-value" class="text-sm text-gray-600">100%</span>
                        </div>
                    </div>
                </div>

                <!-- Shapes Panel -->
                <div id="shapes-panel" class="tool-panel hidden">
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button class="shape-btn border-2 border-gray-300 py-4 rounded-lg hover:border-blue-600 hover:bg-blue-50" data-shape="rectangle">
                            <i data-lucide="square" class="w-8 h-8 mx-auto"></i>
                            <p class="text-xs mt-2">Retângulo</p>
                        </button>
                        <button class="shape-btn border-2 border-gray-300 py-4 rounded-lg hover:border-blue-600 hover:bg-blue-50" data-shape="circle">
                            <i data-lucide="circle" class="w-8 h-8 mx-auto"></i>
                            <p class="text-xs mt-2">Círculo</p>
                        </button>
                        <button class="shape-btn border-2 border-gray-300 py-4 rounded-lg hover:border-blue-600 hover:bg-blue-50" data-shape="triangle">
                            <i data-lucide="triangle" class="w-8 h-8 mx-auto"></i>
                            <p class="text-xs mt-2">Triângulo</p>
                        </button>
                        <button class="shape-btn border-2 border-gray-300 py-4 rounded-lg hover:border-blue-600 hover:bg-blue-50" data-shape="star">
                            <i data-lucide="star" class="w-8 h-8 mx-auto"></i>
                            <p class="text-xs mt-2">Estrela</p>
                        </button>
                    </div>
                    
                    <div id="shape-controls" class="space-y-4 hidden">
                        <div>
                            <label class="form-label">Cor de Preenchimento</label>
                            <input type="color" id="shape-fill" value="#3b82f6" class="w-full h-10 rounded cursor-pointer">
                        </div>
                        <div>
                            <label class="form-label">Cor do Contorno</label>
                            <input type="color" id="shape-stroke" value="#000000" class="w-full h-10 rounded cursor-pointer">
                        </div>
                        <div>
                            <label class="form-label">Espessura do Contorno</label>
                            <input type="range" id="shape-stroke-width" min="0" max="10" value="2" class="w-full">
                            <span id="shape-stroke-value" class="text-sm text-gray-600">2px</span>
                        </div>
                    </div>
                </div>

                <!-- Layers -->
                <div class="mt-8 pt-6 border-t">
                    <h3 class="font-bold mb-4 flex items-center justify-between">
                        <span>Camadas</span>
                        <button id="clear-all" class="text-red-600 text-sm hover:text-red-700">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </h3>
                    <div id="layers-list" class="space-y-2">
                        <p class="text-sm text-gray-500 text-center py-4">Nenhuma camada ainda</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="flex-1 flex flex-col">
            <!-- Canvas Toolbar -->
            <div class="bg-white border-b px-6 py-3 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="zoom-out" class="p-2 hover:bg-gray-100 rounded">
                        <i data-lucide="zoom-out" class="w-5 h-5"></i>
                    </button>
                    <span id="zoom-level" class="text-sm font-semibold">100%</span>
                    <button id="zoom-in" class="p-2 hover:bg-gray-100 rounded">
                        <i data-lucide="zoom-in" class="w-5 h-5"></i>
                    </button>
                    <button id="zoom-fit" class="text-sm px-3 py-1 hover:bg-gray-100 rounded">
                        Ajustar
                    </button>
                </div>
                
                <div class="flex items-center gap-3">
                    <button id="undo-btn" class="p-2 hover:bg-gray-100 rounded" title="Desfazer">
                        <i data-lucide="undo" class="w-5 h-5"></i>
                    </button>
                    <button id="redo-btn" class="p-2 hover:bg-gray-100 rounded" title="Refazer">
                        <i data-lucide="redo" class="w-5 h-5"></i>
                    </button>
                    <div class="border-l h-6 mx-2"></div>
                </div>
            </div>

            <!-- Canvas -->
            <div class="flex-1 overflow-auto bg-gray-100 p-8">
                <div class="max-w-4xl mx-auto">
                    <div id="canvas-container" class="bg-white shadow-lg rounded-lg overflow-hidden" style="width: 800px; height: 600px; margin: 0 auto;">
                        <svg id="design-canvas" width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
                            <!-- Print Area Guide -->
                            <rect id="print-area" x="50" y="50" width="700" height="500" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="10,5" opacity="0.5"/>
                            <text x="400" y="30" text-anchor="middle" fill="#3b82f6" font-size="14" opacity="0.7">Área de Impressão</text>
                        </svg>
                    </div>
                    <p class="text-center text-sm text-gray-500 mt-4">
                        <i data-lucide="info" class="w-4 h-4 inline"></i>
                        Apenas o conteúdo dentro da área marcada será impresso
                    </p>
                </div>
            </div>

            <!-- Bottom Action Bar -->
            <div class="bg-white border-t px-6 py-4 flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-600">Produto: <span id="product-info" class="font-semibold"></span></p>
                    <p class="text-sm text-gray-600">Preço: <span id="product-price" class="font-bold text-blue-600"></span></p>
                </div>
                <div class="flex gap-3">
                    <button id="add-to-cart-custom" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold flex items-center gap-2">
                        <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                        <span id="cart-btn-text">Adicionar ao Carrinho</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="logic.js"></script>
    <script src="personalizar.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
