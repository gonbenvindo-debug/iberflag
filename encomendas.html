<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Encomendas - IberFlag</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/tailwind.output.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a href="/" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-blue-800 bg-clip-text text-transparent">IberFlag</a>
                <a href="/produtos.html" class="inline-flex items-center gap-2 text-sm font-semibold text-blue-700 hover:text-blue-800">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Voltar aos produtos
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <section class="admin-card mb-6">
            <div class="p-6 border-b border-gray-100">
                <h1 class="text-3xl font-bold text-gray-900">Minhas Encomendas</h1>
                <p class="text-sm text-gray-600 mt-2">Consulte o estado atual da producao, expedicao e entrega da sua encomenda.</p>
            </div>

            <form id="orders-search-form" class="p-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label for="orders-email" class="form-label">Email da Encomenda *</label>
                    <input id="orders-email" name="email" type="email" required class="form-input" placeholder="cliente@empresa.pt">
                </div>
                <div>
                    <label for="orders-number" class="form-label">Nº Encomenda (opcional)</label>
                    <input id="orders-number" name="orderNumber" type="text" class="form-input" placeholder="IBF1234567890">
                </div>
                <div class="flex items-end">
                    <button id="orders-search-btn" type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                        Procurar Encomendas
                    </button>
                </div>
            </form>
        </section>

        <section class="space-y-4" id="customer-orders-results">
            <div class="admin-card p-8 text-center text-gray-500">
                <i data-lucide="package-search" class="w-10 h-10 mx-auto mb-3 text-gray-300"></i>
                Introduza o seu email para consultar encomendas.
            </div>
        </section>
    </main>

    <script src="/js/logic.js"></script>
    <script src="/js/order-workflow.js"></script>
    <script src="/js/encomendas.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
