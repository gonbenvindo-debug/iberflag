<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Encomendas - IberFlag</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/tailwind.output.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a href="/" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-blue-800 bg-clip-text text-transparent">IberFlag</a>
                <a href="/produtos.html" class="inline-flex items-center gap-2 text-sm font-semibold text-blue-700 hover:text-blue-800">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Voltar aos produtos
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10 min-h-[calc(100vh-64px)] flex items-center">
        <section class="w-full">
            <div class="relative overflow-hidden rounded-3xl border border-blue-100 bg-white shadow-xl">
                <div class="absolute -top-20 -right-20 w-72 h-72 rounded-full bg-blue-100 opacity-70 pointer-events-none"></div>
                <div class="absolute -bottom-24 -left-24 w-80 h-80 rounded-full bg-cyan-100 opacity-60 pointer-events-none"></div>

                <div class="relative p-8 md:p-12 max-w-3xl mx-auto text-center">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-50 border border-blue-100 text-blue-700 text-xs font-semibold">
                        <i data-lucide="package-search" class="w-3 h-3"></i>
                        Tracking de encomendas
                    </div>

                    <h1 class="text-4xl md:text-5xl font-black text-gray-900 mt-5 leading-tight">Acompanhe a sua encomenda</h1>
                    <p class="text-gray-600 text-base md:text-lg mt-4">Insira o codigo identificador da encomenda para ver o estado completo, tracking e produtos com design.</p>

                    <form id="orders-search-form" class="mt-8 flex flex-col md:flex-row items-stretch gap-3">
                        <input id="orders-identifier" name="identifier" type="text" required class="form-input h-14 text-lg font-semibold tracking-wide md:flex-1" placeholder="IBF1234567890" autocomplete="off">
                        <button id="orders-search-btn" type="submit" class="h-14 px-7 rounded-lg bg-blue-600 text-white font-bold hover:bg-blue-700 transition inline-flex items-center justify-center gap-2 whitespace-nowrap">
                            <i data-lucide="search" class="w-4 h-4"></i>
                            Ver encomenda
                        </button>
                    </form>

                    <p class="text-xs text-gray-500 mt-4">Este acesso e feito apenas por codigo identificador.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/logic.js"></script>
    <script src="/js/encomendas.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
